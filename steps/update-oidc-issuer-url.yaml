parameters:
  - name: serviceConnection
    type: string
    default: ''
  - name: environment
    type: string
    default: ''
  - name: cluster
    type: string
    default: ''
  - name: clusterPrefix
    type: string
    default: 'cft'
  - name: fluxConfigEnvironment
    type: string
    default: ''
  - name: keyvaultServiceConnection
    type: string
    default: 'DTS-CFTPTL-INTSVC'
  - name: keyvaultName
    type: string
    default: 'cftptl-intsvc'
  - name: gitTokenSecret
    type: string
    default: 'aks-cft-deploy-bootstrap-issuer-url-token'
  - name: fluxConfigRepo
    type: string

steps:
- ${{ if ne(parameters.cluster, 'All') }}:
  - task: AzureCLI@2
    displayName: 'Get AKS OIDC Issuer URL'
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        echo "##vso[task.setvariable variable=AKS_ISSUER_URL]$(az aks show \
          -n ${{ parameters.clusterPrefix }}-${{ parameters.environment }}-${{ parameters.cluster }}-aks \
          -g ${{ parameters.clusterPrefix }}-${{ parameters.environment }}-${{ parameters.cluster }}-rg \
          --query "oidcIssuerProfile.issuerUrl" -otsv)"

- task: AzureKeyVault@1
  displayName: 'Get OIDC issuer URL git token from Keyvault'
  inputs:
    azureSubscription: ${{ parameters.keyvaultServiceConnection }}
    keyVaultName: ${{ parameters.keyvaultName }}
    secretsFilter: ${{ parameters.gitTokenSecret }}

- task: Bash@3
  displayName: 'Update OIDC Issuer URL in flux-config'
  env:
    ISSUER_URL: $(AKS_ISSUER_URL)
    GIT_TOKEN: $(${{ parameters.gitTokenSecret }})
  inputs:
    targetType: inline
    workingDirectory: $(Pipeline.Workspace)/s
    script: |
        set -e

        ENV="${{ parameters.environment }}"
        CLUSTER="${{ parameters.cluster }}"
        REPO="${{ parameters.fluxConfigRepo }}"
        FLUX_ENV="${{ parameters.fluxConfigEnvironment }}"

        cd "$REPO"

        if [ -n "$ISSUER_URL" ]; then
          echo "Issuer URL is: ${ISSUER_URL}"

          if [ -z "$FLUX_ENV" ]; then
            FLUX_ENV=$([[ "$ENV" == "ptl" ]] && echo "ptl-intsvc" || ([[ "$ENV" == "ptlsbox" ]] && echo "sbox-intsvc" || echo "$ENV"))
          fi

          file_path="apps/flux-system/${FLUX_ENV}/${CLUSTER}/kustomize.yaml"
          sed -i -e "s/ISSUER_URL:.*/ISSUER_URL: \"$(echo "$ISSUER_URL" | sed 's/[\/&]/\\&/g')\"/g" "$file_path"

          if [[ -n $(git status -s) ]]; then
            git diff .
            git config --global user.email github-platform-operations@HMCTS.NET
            git config --global user.name "hmcts-platform-operations"
            git add .
            git commit -m "Updating OIDC Issuer URL for $CLUSTER cluster in $FLUX_ENV"
            git remote set-url origin "https://hmcts-platform-operations:${GIT_TOKEN}@github.com/hmcts/${REPO}.git"
            git pull origin master --rebase
            for i in {1..5}; do
              git push --set-upstream origin HEAD:master && break || {
                echo "Failed to push, attempt $i of 5 - pulling remote again"
                git pull origin master --rebase
              }
            done
          else
            echo "No change to issuer URL, skipping git push..."
          fi
        fi
